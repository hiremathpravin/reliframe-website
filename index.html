<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReliFrame — Safety engineering, unified.</title>
  <meta name="description" content="A unified platform for FTA, GSN, FMEA, RBD and reliability prediction. Built for safety-critical engineering teams." />

  <!-- Favicons -->
  <link rel="icon" href="public/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="public/favicon-32.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="ReliFrame — Safety engineering, unified." />
  <meta property="og:description" content="A unified platform for FTA, GSN, FMEA, RBD and reliability prediction. Built for safety-critical engineering teams." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://reliframe.com" />
  <meta property="og:image" content="https://reliframe.com/public/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --teal-dark:  #085041;
      --teal-mid:   #1D9E75;
      --teal-light: #5DCAA5;
      --teal-pale:  #9FE1CB;
      --teal-xp:    #E1F5EE;
      --dark:       #121413;
      --off-white:  #FAFAF8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--dark);
      color: var(--off-white);
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 300;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      gap: 1.75rem;
    }

    /* Logo mark */
    .logo-mark {
      width: 72px;
      height: 72px;
    }

    /* Wordmark */
    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 7vw, 2.75rem);
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .wordmark .reli  { font-weight: 700; color: var(--off-white); }
    .wordmark .frame { font-style: italic; color: var(--teal-mid); }

    /* Tagline */
    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--teal-pale);
    }

    /* Heading */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
      font-size: clamp(2.1rem, 8vw, 4rem);
      line-height: 1.08;
      color: var(--off-white);
      max-width: 16ch;
    }
    h1 .unified { font-style: italic; color: var(--teal-mid); }

    /* Sub */
    .sub {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      color: var(--teal-pale);
      max-width: 46ch;
    }

    /* Form */
    form {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      max-width: 440px;
      margin-top: 0.5rem;
    }
    input[type="email"] {
      flex: 1;
      min-width: 0;
      padding: 0.85rem 1.1rem;
      border: 1px solid rgba(159, 225, 203, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--off-white);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    input[type="email"]::placeholder { color: rgba(159, 225, 203, 0.55); }
    input[type="email"]:focus {
      outline: none;
      border-color: var(--teal-mid);
      background: rgba(255, 255, 255, 0.07);
    }
    button {
      padding: 0.85rem 1.4rem;
      border: none;
      border-radius: 10px;
      background: var(--teal-mid);
      color: var(--dark);
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    button:hover { background: var(--teal-light); }
    button:active { transform: translateY(1px); }

    .form-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      color: rgba(159, 225, 203, 0.7);
      margin-top: -0.6rem;
    }

    .thank-you {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      color: var(--teal-light);
      max-width: 440px;
      min-height: 3.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thank-you[hidden] { display: none; }

    /* Footer */
    footer {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: rgba(250, 250, 248, 0.32);
      text-align: center;
      padding: 1.75rem 1.5rem;
    }

    @media (max-width: 480px) {
      form { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <!-- Logo mark: 2x2 grid of rounded squares on a teal-pale field, with a dark connecting T-bar -->
    <svg class="logo-mark" viewBox="0 0 100 100" role="img" aria-label="ReliFrame logo">
      <rect x="0" y="0" width="100" height="100" rx="22" fill="var(--teal-xp)" />
      <rect x="14" y="14" width="33" height="33" rx="9" fill="var(--teal-dark)" />
      <rect x="53" y="14" width="33" height="33" rx="9" fill="var(--teal-light)" />
      <rect x="14" y="53" width="33" height="33" rx="9" fill="var(--teal-light)" />
      <rect x="53" y="53" width="33" height="33" rx="9" fill="var(--teal-mid)" />
      <!-- Connecting T-bar line -->
      <path d="M50 20 V50 M30 50 H70" stroke="var(--dark)" stroke-width="5" stroke-linecap="round" fill="none" />
    </svg>

    <div class="wordmark"><span class="reli">Reli</span><span class="frame">Frame</span></div>

    <div class="tagline">Reliability · Safety · Assurance</div>

    <h1>Safety engineering, <span class="unified">unified.</span></h1>

    <p class="sub">A unified platform for FTA, GSN, FMEA, RBD and reliability prediction. Built for safety-critical engineering teams.</p>

    <form id="notify-form" novalidate>
      <input type="email" id="email" name="email" placeholder="you@company.com" required aria-label="Email address" />
      <button type="submit">Notify me</button>
    </form>
    <p class="form-note">Early access for FTAStudio users</p>

    <p class="thank-you" id="thank-you" hidden>Thanks — you're on the list. We'll be in touch.</p>
  </main>

  <footer>reliframe.com · © 2026</footer>

  <script>
    (function () {
      var form = document.getElementById('notify-form');
      var note = document.querySelector('.form-note');
      var thankYou = document.getElementById('thank-you');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById('email').focus();
          return;
        }
        form.hidden = true;
        if (note) note.hidden = true;
        thankYou.hidden = false;
      });
    })();
  </script>
</body>
</html>
